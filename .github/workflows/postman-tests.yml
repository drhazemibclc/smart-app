name: Postman API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  api-tests:
    name: Run Postman API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup environment
        run: |
          cp .env.example .env || echo "No .env.example found"
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/testdb" >> .env
          echo "REDIS_URL=redis://localhost:6379" >> .env
          echo "NODE_ENV=test" >> .env
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env
          echo "NEXTAUTH_SECRET=test-secret-key-for-ci" >> .env

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

      - name: Seed database
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          SKIP_ENV_VALIDATION: true

      - name: Start application
        run: |
          npm run start &
          echo $! > .app.pid
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379
          NODE_ENV: production
          PORT: 3000

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start..."
          npx wait-on http://localhost:3000/api/health --timeout 120000 --interval 2000
          echo "Application is ready!"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Generate Postman collection
        run: npm run generate:postman

      - name: Run Postman tests
        run: |
          newman run .postman/collections/pediatric-clinic-medical.json \
            -e .postman/environments/ci.json \
            --reporters cli,htmlextra,junit \
            --reporter-htmlextra-export ./test-reports/postman-report.html \
            --reporter-htmlextra-title "Pediatric Clinic API Tests - CI" \
            --reporter-htmlextra-showOnlyFails \
            --reporter-junit-export ./test-reports/junit-report.xml \
            --timeout-request 10000 \
            --bail

      - name: Stop application
        if: always()
        run: |
          if [ -f .app.pid ]; then
            kill $(cat .app.pid) || true
            rm .app.pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-test-results
          path: test-reports/
          retention-days: 30

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-reports/junit-report.xml
          check_name: Postman API Test Results

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = './test-reports/postman-report.html';

            let comment = '## 🧪 Postman API Test Results\n\n';

            if (fs.existsSync(reportPath)) {
              comment += '✅ Tests completed! View the detailed report in the artifacts.\n\n';
              comment += `[Download Test Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
            } else {
              comment += '❌ Tests failed to complete. Check the workflow logs for details.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Fail workflow if tests failed
        if: failure()
        run: |
          echo "::error::Postman API tests failed. Check the test report for details."
          exit 1

  notify:
    name: Notify Results
    needs: api-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.api-tests.result }}" == "success" ]; then
            echo "✅ All API tests passed!"
          else
            echo "❌ API tests failed!"
          fi
